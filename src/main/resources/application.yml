# Tavily Search API 配置
tavily:
  api:
    key: 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  # Tavily API Key
    base-url: https://api.tavily.com  # Tavily API 基础地址
  search:
    default-count: 10  # 默认返回结果数
    country: SG       # 兼容字段（Tavily当前未使用）
    locale: en         # 兼容字段（Tavily当前未使用）
    timeout-ms: 5000   # 超时时间（毫秒）
    max-retries: 1     # 最大重试次数
    strict-singapore: true   # 仅保留新加坡结果
    allow-sea-fallback: false # 若新加坡无结果，是否回退东南亚（默认不回退）
  enabled: true        # 是否启用 Tavily Search
  enhancement:
    enabled: true
    max-concurrent: 3
    page-timeout-ms: 8000
    max-content-length: 12000
    llm-extraction-enabled: true

# Punchout 配置
punchout:
  frontend-url: http://localhost:3000  # 前端购物网站URL，用于生成重定向URL
  # 允许的发送者配置（格式：identity1:secret1,identity2:secret2）
  # 示例：allowed-senders: AIR_LIQUIDE:s3cr3tk3y!,COUPA:another-secret
  allowed-senders: AIR_LIQUIDE:s3cr3tk3y!
  # 供应商身份信息（用于构建PunchOutOrderMessage）
  supplier-identity: Allinton123  # 供应商标识
  supplier-domain: allinton.com.sg  # 供应商域名
  # 允许的returnUrl hosts（SSRF防护，格式：host1,host2,host3）
  # 示例：allowed-return-hosts: airliquideasia-test.coupahost.com,airliquide.coupahost.com
  allowed-return-hosts: airliquideasia-test.coupahost.com,airliquide.coupahost.com
  # 测试模式：如果为 true，HTTP 200 但响应体为空时也视为成功（用于测试环境）
  # 生产环境应设置为 false
  test-mode-allow-empty-response: true
  # 会话过期时间（秒），默认 2 小时（7200秒）
  # 可以根据实际需求调整，例如：3600（1小时）、7200（2小时）、14400（4小时）
  session-expiration-seconds: 7200

